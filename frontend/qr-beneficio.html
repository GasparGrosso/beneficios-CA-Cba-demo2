<!DOCTYPE html>

<body>

  <script type="text/plain" id="app-source">
const { useState } = React;
const stroke = (extra={}) => ({ fill:'none', stroke:'currentColor', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round', ...extra });

/* Beneficio seleccionado por ?b=<id>; fallback a un mock. */

const SELECTED = CAC.findBenefitById(CAC.qp('b')) || MOCK_BENEFIT;

function QRValidacion({ benefit }) {

            <div style={{marginTop:'20px', display:'flex', flexDirection:'column', gap:'10px'}}>

                <div style={{display:'flex', justifyContent:'center', marginBottom:'14px', position:'relative', zIndex:2}}>

                  </div>
                </div>
                <h2 style={{fontFamily:"'Plus Jakarta Sans',sans-serif", fontWeight:800, fontSize:'17px', color:'#fff', margin:'0 0 6px', letterSpacing:'.04em', textTransform:'uppercase', position:'relative', zIndex:2}}>¡Beneficio Canjeado!</h2>
                <p style={{fontSize:'13px', color:'rgba(255,255,255,.8)', margin:0, position:'relative', zIndex:2}}>Transacción verificada y registrada correctamente</p>
              </div>

              <div style={{padding:'20px', display:'flex', flexDirection:'column', gap:'12px'}}>
                <div style={{background:'#F8FAFC', borderRadius:'10px', padding:'14px 16px', border:'1px solid #E8EFF6'}}>
                  <div style={{display:'flex', alignItems:'center', gap:'12px', marginBottom:'12px'}}>
                    <div style={{width:'42px', height:'42px', background:b.color, borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                      <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:'13px', fontWeight:800, color:'#fff'}}>{b.logo}</span>
                    </div>
                    <div>
                      <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:'13px', fontWeight:700, color:'#0F172A'}}>{b.nombre}</div>
                      <div style={{fontSize:'11px', color:'#64748B', marginTop:'2px'}}>{b.regional} · Regional Centro</div>
                    </div>
                  </div>
                  <div style={{display:'flex', justifyContent:'space-between', paddingTop:'10px', borderTop:'1px solid #E8EFF6'}}>
                    <div>
                      <div style={{fontSize:'10px', color:'#94A3B8', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:'3px'}}>Descuento aplicado</div>
                      <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:'24px', fontWeight:800, color:'#E05A36', lineHeight:1}}>{descTxt} OFF</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:'10px', color:'#94A3B8', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:'3px'}}>Ahorro estimado</div>
                      <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:'24px', fontWeight:800, color:'#0F172A', lineHeight:1}}>$ 3.800</div>
                    </div>
                  </div>
                </div>

                <div style={{background:'#FFF8F5', border:'1.5px solid #FDCFBA', borderRadius:'10px', padding:'14px 16px'}}>
                  <div style={{display:'flex', alignItems:'center', gap:'7px', marginBottom:'10px'}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" {...stroke({stroke:'#E05A36', strokeWidth:2.5})}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:'11.5px', fontWeight:700, color:'#E05A36', textTransform:'uppercase', letterSpacing:'.05em'}}>Período de carencia activo</span>
                  </div>
                  <div style={{fontSize:'12px', color:'#64748B', marginBottom:'10px'}}>Podrás reutilizar este beneficio en:</div>
                  <div style={{display:'flex', gap:'8px', justifyContent:'center'}}>
                    {[['30','días'],['00','horas'],['00','min']].map((u,i)=>(
                      <div key={i} style={{textAlign:'center', background:'#fff', borderRadius:'6px', padding:'8px 12px', border:'1px solid #FDCFBA', flex:1}}>
                        <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:'24px', fontWeight:800, color:'#0F172A', lineHeight:1.1}}>{u[0]}</div>
                        <div style={{fontSize:'9px', color:'#94A3B8', marginTop:'2px', textTransform:'uppercase', letterSpacing:'.06em'}}>{u[1]}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <button onClick={goBack} className="h-dark" style={backBtnSt}>
                  <svg width="16" height="16" viewBox="0 0 24 24" {...stroke({strokeWidth:2.5})}><polyline points="15 18 9 12 15 6"/></svg>
                  Volver al Menú
                </button>
              </div>
            </div>
          </div>
        )}

        {screen === 'error' && (
          <div style={{animation:'slideIn .35s ease'}}>
            <div style={{background:'#fff', borderRadius:'16px', overflow:'hidden', boxShadow:'0 8px 32px rgba(15,23,42,.12),0 2px 6px rgba(15,23,42,.06)'}}>
              <div style={{background:'linear-gradient(135deg,#FFF5F2,#FEE4D8)', padding:'30px 24px 24px', textAlign:'center', borderBottom:'2px solid #FDCFBA', position:'relative'}}>
                <div style={{display:'flex', justifyContent:'center', marginBottom:'12px'}}>
                  <div style={{width:'78px', height:'78px', background:'#FFF3F0', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', border:'3px solid #FDBA9E', animation:'shake .5s ease .15s both'}}>
                    <svg width="38" height="38" viewBox="0 0 24 24" {...stroke({stroke:'#E05A36', strokeWidth:2.5})}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>

                </div>
                <h2 style={{fontFamily:"'Plus Jakarta Sans',sans-serif", fontWeight:800, fontSize:'17px', color:'#9A2800', margin:'0 0 6px', textTransform:'uppercase', letterSpacing:'.03em'}}>Beneficio No Disponible</h2>

              </div>

              <div style={{padding:'20px', display:'flex', flexDirection:'column', gap:'12px'}}>
                <div style={{background:'#FFF8F5', border:'1.5px solid #FDCFBA', borderRadius:'10px', padding:'14px 16px'}}>
                  <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'10px'}}>
                    <div style={{width:'40px', height:'40px', background:b.color, borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, opacity:.55}}>

                    <div>

const backBtnSt = { width:'100%', padding:'14px', background:'#0F172A', color:'#fff', border:'none', borderRadius:'8px', fontSize:'14px', fontFamily:"'Plus Jakarta Sans',sans-serif", fontWeight:700, cursor:'pointer', transition:'all .2s', letterSpacing:'.04em', display:'flex', alignItems:'center', justifyContent:'center', gap:'8px' };
const QrMeta = ({label, value}) => (

const Bracket = ({c}) => {
  const base = { position:'absolute', width:'22px', height:'22px', pointerEvents:'none' };
  const map = {
    tl:{ top:'5px', left:'5px', borderTop:'3px solid #E05A36', borderLeft:'3px solid #E05A36', borderRadius:'3px 0 0 0' },

    br:{ bottom:'5px', right:'5px', borderBottom:'3px solid #E05A36', borderRight:'3px solid #E05A36', borderRadius:'0 0 3px 0' },
  };
  return <div style={{...base, ...map[c]}}/>;
};
const QRSvg = () => {
  const cells = [[80,15],[96,15],[112,15],[80,63],[96,63],[112,63],[15,80],[63,80],[80,80],[104,80],[120,80],[144,80],[88,88],[112,88],[136,88],[152,88],[80,96],[96,96],[120,96],[128,96],[88,104],[104,104],[136,104],[152,104],[80,112],[112,112],[144,112],[96,120],[120,120],[144,120],[80,128],[104,128],[128,128],[152,128],[88,136],[112,136],[152,136],[136,144],[96,144],[120,144],[80,152],[104,152],[128,152],[152,152]];
  return (
    <svg viewBox="0 0 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" fill="white"/>
      {[[15,15],[127,15],[15,127]].map((p,i)=>(
        <g key={i}>
          <rect x={p[0]} y={p[1]} width="58" height="58" fill="#0F172A" rx="3"/>
          <rect x={p[0]+8} y={p[1]+8} width="42" height="42" fill="white"/>
          <rect x={p[0]+16} y={p[1]+16} width="26" height="26" fill="#0F172A" rx="1"/>
        </g>
      ))}
      {cells.map((c,i)=><rect key={i} x={c[0]} y={c[1]} width="8" height="8" fill="#0F172A"/>)}
    </svg>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<QRValidacion benefit={SELECTED} />);
  </script>
